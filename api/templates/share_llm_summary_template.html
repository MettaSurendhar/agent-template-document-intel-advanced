<!DOCTYPE html>
<html>

<body style="font-family: Arial, sans-serif; color: #333;">
  <p>Hi,</p>

  {% if passage %}
  <p>You have received the following message:</p>
  <blockquote style="background: #f9f9f9; border-left: 4px solid #ccc; padding: 10px;">
    {{ passage }}
  </blockquote>
  {% endif %}


  <p style="margin-top: 20px;">Regards,<br>{{ sender_name }}</p>
</body>

</html>
