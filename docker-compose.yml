services:
  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: docintel-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Uncomment to run the API in Docker too (otherwise run it locally with `make all`
  # against this OpenSearch container while you develop).
  # api:
  #   build: .
  #   env_file: .env
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     opensearch:
  #       condition: service_healthy

volumes:
  opensearch-data:
